<!doctype html>
<html>
  <head>
    <meta name="google-site-verification" content="QDVY5OzeJmkk_U3XlcZqblXcmCXmxO-RSl6Kbi_rbM8" />
    <title>ternbook</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Courier;
        background: #0e0e0e;
        color: #ddd;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 24px;
      }

      header h1 {
        font-size: 1.4rem;
        color: #fff;
      }
      header span {
        font-size: 0.8rem;
        color: #555;
      }

      /* Search */
      .search-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }

      #search-input {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #ccc;
        font-family: Courier;
        font-size: 0.85rem;
        padding: 7px 10px;
      }

      #search-input:focus {
        outline: 1px solid #555;
      }
      #search-input::placeholder {
        color: #444;
      }

      #search-btn {
        background: #1e2a1e;
        border: 1px solid #2a3e2a;
        color: #6abf6a;
        font-family: Courier;
        font-size: 0.85rem;
        padding: 7px 14px;
        cursor: pointer;
      }

      #search-btn:hover {
        background: #243024;
      }

      .search-hint {
        font-size: 0.65rem;
        color: #444;
        margin-bottom: 16px;
        line-height: 1.7;
      }

      .search-hint code {
        color: #666;
        background: #181818;
        padding: 1px 4px;
      }

      /* Filters */
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
        align-items: flex-end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .filter-group label {
        font-size: 0.65rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      select {
        background: #1a1a1a;
        color: #ccc;
        border: 1px solid #333;
        padding: 5px 8px;
        font-family: Courier;
        font-size: 0.8rem;
        cursor: pointer;
        appearance: none;
        min-width: 150px;
      }

      select:focus {
        outline: 1px solid #444;
      }

      .filter-reset {
        background: none;
        border: 1px solid #333;
        color: #555;
        font-family: Courier;
        font-size: 0.8rem;
        padding: 5px 10px;
        cursor: pointer;
      }

      .filter-reset:hover {
        color: #aaa;
        border-color: #555;
      }

      #count {
        font-size: 0.75rem;
        color: #444;
        margin-bottom: 16px;
      }

      /* Site grid */
      .sites {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }

      .site {
        border: 1px solid #222;
        padding: 14px;
        background: #121212;
      }

      .site h2 {
        font-size: 0.95rem;
        margin-bottom: 4px;
      }

      .site h2 a {
        color: #7eb8f7;
        text-decoration: none;
      }

      .site h2 a:hover {
        text-decoration: underline;
      }

      .site .desc {
        font-size: 0.78rem;
        color: #777;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 6px;
      }

      .tag {
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 2px;
      }

      .tag-user {
        background: #1e2a1e;
        color: #6abf6a;
        border: 1px solid #2a3e2a;
      }
      .tag-system {
        background: #1e1e2e;
        color: #7a7abf;
        border: 1px solid #2a2a3e;
      }

      .site .meta {
        font-size: 0.65rem;
        color: #444;
        margin-top: 6px;
      }
      .site .meta span + span::before {
        content: " · ";
      }

      .no-results {
        color: #444;
        font-size: 0.85rem;
        padding: 40px 0;
        grid-column: 1 / -1;
      }

      .mode-badge {
        display: inline-block;
        font-size: 0.65rem;
        padding: 2px 6px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #555;
        margin-left: 8px;
        vertical-align: middle;
      }

      .mode-badge.search {
        border-color: #2a3e2a;
        color: #6abf6a;
        background: #1e2a1e;
      }

      #sentinel {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 0.7rem;
        color: #333;
        padding: 24px 0 40px;
        min-height: 64px;
      }
    </style>
  </head>
  <body style="font-family: Courier;">
    <header>
      <h1>ternbook</h1>
      <span>a web directory</span>
      <span><a style="color: darkgray" href="/random">random</a></span>
      <span><a style="color: darkgray" href="/map">map</a></span>
      <span><a style="color: darkgray" href="https://ternbook.neocities.org">about</a></span>
    </header>

    <!-- Search -->
    <div class="search-row">
      <input
        id="search-input"
        type="text"
        placeholder="search…  try: tag:blog,coding  desc:recipes  -is:ghostsite  OR"
        spellcheck="false"
      />
      <button id="search-btn">search</button>
    </div>
    <div class="search-hint">
      <code>tag:a,b</code> match tags &nbsp; <code>title:word</code> match name
      &nbsp; <code>desc:word</code> match description &nbsp;
      <code>is:verified</code> system tag &nbsp; <code>-tag:nsfw</code> exclude
      &nbsp; <code>OR</code> any instead of all
    </div>

    <!-- Dropdown filters -->
    <div class="filters">
      <div class="filter-group">
        <label>Core Content</label>
        <select id="f-core">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Vibe / Web Culture</label>
        <select id="f-vibe">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Content Safety</label>
        <select id="f-safety">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Ternbook Native</label>
        <select id="f-system">
          <option value="">All</option>
        </select>
      </div>
      <button class="filter-reset" id="reset">reset all</button>
    </div>

    <div id="count"></div>
    <div class="sites" id="sites"></div>
    <div id="sentinel"></div>

    <script>
      const PAGE_SIZE = 20;
      let currentPage  = 0;
      let currentTotal = 0;
      let currentTags  = [];
      let isLoading    = false;
      let hasMore      = true;
      let searchMode   = false;
      let observer     = null;

      const container = document.getElementById("sites");
      const countEl   = document.getElementById("count");
      const sentinel  = document.getElementById("sentinel");

      // ── Helpers ──────────────────────────────────────────────────────
      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function makeSiteCard(site) {
        const userTags   = (site.tags || []).map((t) => `<span class="tag tag-user">${esc(t)}</span>`).join("");
        const systemTags = (site.systemTags || []).map((t) => `<span class="tag tag-system">${esc(t)}</span>`).join("");
        const mutualCount = (site.mutuals || []).length;
        const div = document.createElement("div");
        div.className = "site";
        div.innerHTML = `
          <h2><a href="${esc(site.url)}" target="_blank" rel="noopener">${esc(site.name)}</a></h2>
          <p class="desc">${esc(site.description || "")}</p>
          <div class="tags">${userTags}${systemTags}</div>
          <div class="meta">
            <span>${(site.neighbors || []).length} neighbors</span>
            ${mutualCount ? `<span>${mutualCount} mutual${mutualCount !== 1 ? "s" : ""}</span>` : ""}
          </div>
        `;
        return div;
      }

      function updateCount(badge) {
        const n = searchMode ? currentTotal : currentTotal;
        countEl.innerHTML = `${n} site${n !== 1 ? "s" : ""}${badge || ""}`;
      }

      function setSentinel(text) {
        sentinel.textContent = text;
      }

      // ── Lazy load (browse mode) ───────────────────────────────────────
      function setupObserver() {
        if (observer) observer.disconnect();
        observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && !isLoading && hasMore && !searchMode) {
            loadNextPage();
          }
        }, { rootMargin: "300px" });
        observer.observe(sentinel);
      }

      async function loadNextPage() {
        if (isLoading || !hasMore) return;
        isLoading = true;
        setSentinel("loading…");

        try {
          const tagParam  = currentTags.length > 0 ? `&tags=${currentTags.join(",")}&match=all` : "";
          const res       = await fetch(`/api/sites?page=${currentPage + 1}&limit=${PAGE_SIZE}${tagParam}`);
          const data      = await res.json();

          currentPage  = data.page;
          currentTotal = data.total;
          hasMore      = data.page < data.pages;

          if (currentPage === 1 && data.sites.length === 0) {
            container.innerHTML = '<p class="no-results">no sites match</p>';
            updateCount("");
            setSentinel("");
            return;
          }

          const frag = document.createDocumentFragment();
          data.sites.forEach((s) => frag.appendChild(makeSiteCard(s)));
          container.appendChild(frag);

          updateCount("");
          setSentinel(hasMore ? "" : "— end of directory —");
        } catch {
          setSentinel("failed to load — try refreshing");
        } finally {
          isLoading = false;
        }
      }

      function resetAndLoad(tags) {
        searchMode   = false;
        currentPage  = 0;
        currentTotal = 0;
        currentTags  = tags;
        hasMore      = true;
        container.innerHTML = "";
        setSentinel("");
        setupObserver();
        loadNextPage();
      }

      // ── Tag dropdowns ────────────────────────────────────────────────
      async function loadTags() {
        const res  = await fetch("/api/tags");
        const tags = await res.json();
        populate("f-core",   tags.coreContent);
        populate("f-vibe",   tags.vibeWebCulture);
        populate("f-safety", tags.contentSafety);
        populate("f-system", tags.systemTags);
      }

      function populate(id, tags) {
        const sel = document.getElementById(id);
        tags.forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          sel.appendChild(opt);
        });
        sel.addEventListener("change", () => {
          clearSearch();
          resetAndLoad(getDropdownTags());
        });
      }

      function getDropdownTags() {
        return ["f-core", "f-vibe", "f-safety", "f-system"]
          .map((id) => document.getElementById(id).value)
          .filter(Boolean);
      }

      // ── Search ───────────────────────────────────────────────────────
      async function runSearch() {
        const q = document.getElementById("search-input").value.trim();
        if (!q) { clearSearch(); resetAndLoad(getDropdownTags()); return; }

        if (observer) observer.disconnect();
        searchMode   = true;
        isLoading    = true;
        setSentinel("");
        container.innerHTML = "";

        try {
          const res  = await fetch("/api/search?q=" + encodeURIComponent(q));
          if (!res.ok) return;
          const data = await res.json();

          currentTotal = data.count;
          const badge  = '<span class="mode-badge search">search results</span>';
          updateCount(badge);

          if (data.results.length === 0) {
            container.innerHTML = '<p class="no-results">no sites match</p>';
            return;
          }
          const frag = document.createDocumentFragment();
          data.results.forEach((s) => frag.appendChild(makeSiteCard(s)));
          container.appendChild(frag);
          setSentinel("— end of search results —");
        } finally {
          isLoading = false;
        }
      }

      function clearSearch() {
        document.getElementById("search-input").value = "";
        searchMode = false;
      }

      document.getElementById("search-btn").addEventListener("click", runSearch);
      document.getElementById("search-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter")  runSearch();
        if (e.key === "Escape") { clearSearch(); resetAndLoad(getDropdownTags()); }
      });

      // ── Reset ────────────────────────────────────────────────────────
      document.getElementById("reset").addEventListener("click", () => {
        ["f-core", "f-vibe", "f-safety", "f-system"].forEach((id) => {
          document.getElementById(id).value = "";
        });
        clearSearch();
        resetAndLoad([]);
      });

      // ── Init ─────────────────────────────────────────────────────────
      loadTags();
      resetAndLoad([]);
    </script>
  </body>
</html>
