<!doctype html>
<html>
  <head>
    <title>ternbook</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: monospace;
        background: #0e0e0e;
        color: #ddd;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 24px;
      }

      header h1 {
        font-size: 1.4rem;
        color: #fff;
      }
      header span {
        font-size: 0.8rem;
        color: #555;
      }

      /* Search */
      .search-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }

      #search-input {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #ccc;
        font-family: monospace;
        font-size: 0.85rem;
        padding: 7px 10px;
      }

      #search-input:focus {
        outline: 1px solid #555;
      }
      #search-input::placeholder {
        color: #444;
      }

      #search-btn {
        background: #1e2a1e;
        border: 1px solid #2a3e2a;
        color: #6abf6a;
        font-family: monospace;
        font-size: 0.85rem;
        padding: 7px 14px;
        cursor: pointer;
      }

      #search-btn:hover {
        background: #243024;
      }

      .search-hint {
        font-size: 0.65rem;
        color: #444;
        margin-bottom: 16px;
        line-height: 1.7;
      }

      .search-hint code {
        color: #666;
        background: #181818;
        padding: 1px 4px;
      }

      /* Filters */
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
        align-items: flex-end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .filter-group label {
        font-size: 0.65rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      select {
        background: #1a1a1a;
        color: #ccc;
        border: 1px solid #333;
        padding: 5px 8px;
        font-family: monospace;
        font-size: 0.8rem;
        cursor: pointer;
        appearance: none;
        min-width: 150px;
      }

      select:focus {
        outline: 1px solid #444;
      }

      .filter-reset {
        background: none;
        border: 1px solid #333;
        color: #555;
        font-family: monospace;
        font-size: 0.8rem;
        padding: 5px 10px;
        cursor: pointer;
      }

      .filter-reset:hover {
        color: #aaa;
        border-color: #555;
      }

      #count {
        font-size: 0.75rem;
        color: #444;
        margin-bottom: 16px;
      }

      /* Site grid */
      .sites {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }

      .site {
        border: 1px solid #222;
        padding: 14px;
        background: #121212;
      }

      .site h2 {
        font-size: 0.95rem;
        margin-bottom: 4px;
      }

      .site h2 a {
        color: #7eb8f7;
        text-decoration: none;
      }

      .site h2 a:hover {
        text-decoration: underline;
      }

      .site .desc {
        font-size: 0.78rem;
        color: #777;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 6px;
      }

      .tag {
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 2px;
      }

      .tag-user {
        background: #1e2a1e;
        color: #6abf6a;
        border: 1px solid #2a3e2a;
      }
      .tag-system {
        background: #1e1e2e;
        color: #7a7abf;
        border: 1px solid #2a2a3e;
      }

      .site .meta {
        font-size: 0.65rem;
        color: #444;
        margin-top: 6px;
      }
      .site .meta span + span::before {
        content: " · ";
      }

      .no-results {
        color: #444;
        font-size: 0.85rem;
        padding: 40px 0;
        grid-column: 1 / -1;
      }

      .mode-badge {
        display: inline-block;
        font-size: 0.65rem;
        padding: 2px 6px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #555;
        margin-left: 8px;
        vertical-align: middle;
      }

      .mode-badge.search {
        border-color: #2a3e2a;
        color: #6abf6a;
        background: #1e2a1e;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ternbook</h1>
      <span>a web directory</span>
      <span><a style="color: darkgray" href="/random">random</a></span>
      <span><a style="color: darkgray" href="/map">map</a></span>
    </header>

    <!-- Search -->
    <div class="search-row">
      <input
        id="search-input"
        type="text"
        placeholder="search…  try: tag:blog,coding  desc:recipes  -is:ghostsite  OR"
        spellcheck="false"
      />
      <button id="search-btn">search</button>
    </div>
    <div class="search-hint">
      <code>tag:a,b</code> match tags &nbsp; <code>title:word</code> match name
      &nbsp; <code>desc:word</code> match description &nbsp;
      <code>is:verified</code> system tag &nbsp; <code>-tag:nsfw</code> exclude
      &nbsp; <code>OR</code> any instead of all
    </div>

    <!-- Dropdown filters -->
    <div class="filters">
      <div class="filter-group">
        <label>Core Content</label>
        <select id="f-core">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Vibe / Web Culture</label>
        <select id="f-vibe">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Content Safety</label>
        <select id="f-safety">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Ternbook Native</label>
        <select id="f-system">
          <option value="">All</option>
        </select>
      </div>
      <button class="filter-reset" id="reset">reset all</button>
    </div>

    <div id="count"></div>
    <div class="sites" id="sites"></div>

    <script>
      let allSites = [];
      let searchMode = false;

      // ── Tag dropdowns ────────────────────────────────────────────────
      async function loadTags() {
        const res = await fetch("/api/tags");
        const tags = await res.json();
        populate("f-core", tags.coreContent);
        populate("f-vibe", tags.vibeWebCulture);
        populate("f-safety", tags.contentSafety);
        populate("f-system", tags.systemTags);
      }

      function populate(id, tags) {
        const sel = document.getElementById(id);
        tags.forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          sel.appendChild(opt);
        });
        sel.addEventListener("change", () => {
          clearSearch();
          applyDropdowns();
        });
      }

      function getDropdownTags() {
        return ["f-core", "f-vibe", "f-safety", "f-system"]
          .map((id) => document.getElementById(id).value)
          .filter(Boolean);
      }

      function applyDropdowns() {
        const active = getDropdownTags();
        const results =
          active.length === 0
            ? allSites
            : allSites.filter((site) => {
                const siteTags = new Set([
                  ...(site.tags || []),
                  ...(site.systemTags || []),
                ]);
                return active.every((t) => siteTags.has(t));
              });
        renderSites(results, false);
      }

      // ── Search ───────────────────────────────────────────────────────
      async function runSearch() {
        const q = document.getElementById("search-input").value.trim();
        if (!q) {
          clearSearch();
          applyDropdowns();
          return;
        }

        const res = await fetch("/api/search?q=" + encodeURIComponent(q));
        if (!res.ok) {
          return;
        }
        const data = await res.json();
        searchMode = true;
        renderSites(data.results, true);
      }

      function clearSearch() {
        searchMode = false;
        document.getElementById("search-input").value = "";
      }

      document
        .getElementById("search-btn")
        .addEventListener("click", runSearch);
      document
        .getElementById("search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") runSearch();
          if (e.key === "Escape") {
            clearSearch();
            applyDropdowns();
          }
        });

      // ── Reset ────────────────────────────────────────────────────────
      document.getElementById("reset").addEventListener("click", () => {
        ["f-core", "f-vibe", "f-safety", "f-system"].forEach((id) => {
          document.getElementById(id).value = "";
        });
        clearSearch();
        applyDropdowns();
      });

      // ── Render ───────────────────────────────────────────────────────
      function renderSites(sites, isSearch) {
        const container = document.getElementById("sites");
        const count = document.getElementById("count");
        container.innerHTML = "";

        const badge = isSearch
          ? '<span class="mode-badge search">search results</span>'
          : "";
        count.innerHTML = `${sites.length} site${sites.length !== 1 ? "s" : ""}${badge}`;

        if (sites.length === 0) {
          container.innerHTML = '<p class="no-results">no sites match</p>';
          return;
        }

        sites.forEach((site) => {
          const userTags = (site.tags || [])
            .map((t) => `<span class="tag tag-user">${esc(t)}</span>`)
            .join("");
          const systemTags = (site.systemTags || [])
            .map((t) => `<span class="tag tag-system">${esc(t)}</span>`)
            .join("");
          const mutualCount = (site.mutuals || []).length;

          const div = document.createElement("div");
          div.className = "site";
          div.innerHTML = `
            <h2><a href="${esc(site.url)}" target="_blank" rel="noopener">${esc(site.name)}</a></h2>
            <p class="desc">${esc(site.description || "")}</p>
            <div class="tags">${userTags}${systemTags}</div>
            <div class="meta">
              <span>${(site.neighbors || []).length} neighbors</span>
              ${mutualCount ? `<span>${mutualCount} mutual${mutualCount !== 1 ? "s" : ""}</span>` : ""}
            </div>
          `;
          container.appendChild(div);
        });
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ── Init ─────────────────────────────────────────────────────────
      async function loadSites() {
        const res = await fetch("/api/sites");
        allSites = await res.json();
        applyDropdowns();
      }

      loadTags();
      loadSites();
    </script>
  </body>
</html>
