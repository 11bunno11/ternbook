<!doctype html>
<html>
  <head>
    <title>ternbook</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: monospace;
        background: #0e0e0e;
        color: #ddd;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 24px;
      }

      header h1 {
        font-size: 1.4rem;
        color: #fff;
      }

      header span {
        font-size: 0.8rem;
        color: #555;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
        align-items: center;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .filter-group label {
        font-size: 0.65rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      select {
        background: #1a1a1a;
        color: #ccc;
        border: 1px solid #333;
        padding: 5px 8px;
        font-family: monospace;
        font-size: 0.8rem;
        cursor: pointer;
        appearance: none;
        min-width: 150px;
      }

      select:focus { outline: 1px solid #444; }

      .filter-reset {
        background: none;
        border: 1px solid #333;
        color: #555;
        font-family: monospace;
        font-size: 0.8rem;
        padding: 5px 10px;
        cursor: pointer;
        align-self: flex-end;
      }

      .filter-reset:hover { color: #aaa; border-color: #555; }

      #count {
        font-size: 0.75rem;
        color: #444;
        margin-bottom: 16px;
      }

      .sites {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }

      .site {
        border: 1px solid #222;
        padding: 14px;
        background: #121212;
      }

      .site h2 {
        font-size: 0.95rem;
        margin-bottom: 4px;
      }

      .site h2 a {
        color: #7eb8f7;
        text-decoration: none;
      }

      .site h2 a:hover { text-decoration: underline; }

      .site .desc {
        font-size: 0.78rem;
        color: #777;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 6px;
      }

      .tag {
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 2px;
      }

      .tag-user   { background: #1e2a1e; color: #6abf6a; border: 1px solid #2a3e2a; }
      .tag-system { background: #1e1e2e; color: #7a7abf; border: 1px solid #2a2a3e; }

      .site .meta {
        font-size: 0.65rem;
        color: #444;
        margin-top: 6px;
      }

      .site .meta span + span::before {
        content: " · ";
      }

      .no-results {
        color: #444;
        font-size: 0.85rem;
        padding: 40px 0;
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ternbook</h1>
      <span>a web directory</span>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label>Core Content</label>
        <select id="f-core"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label>Vibe / Web Culture</label>
        <select id="f-vibe"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label>Content Safety</label>
        <select id="f-safety"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label>Ternbook Native</label>
        <select id="f-system"><option value="">All</option></select>
      </div>
      <button class="filter-reset" id="reset">reset</button>
    </div>

    <div id="count"></div>
    <div class="sites" id="sites"></div>

    <script>
      let allSites = [];

      async function loadTags() {
        const res = await fetch("/api/tags");
        const tags = await res.json();

        populate("f-core",   tags.coreContent);
        populate("f-vibe",   tags.vibeWebCulture);
        populate("f-safety", tags.contentSafety);
        populate("f-system", tags.systemTags);
      }

      function populate(id, tags) {
        const sel = document.getElementById(id);
        tags.forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          sel.appendChild(opt);
        });
        sel.addEventListener("change", applyFilters);
      }

      function getSelected() {
        return ["f-core", "f-vibe", "f-safety", "f-system"]
          .map((id) => document.getElementById(id).value)
          .filter(Boolean);
      }

      function applyFilters() {
        const active = getSelected();

        const results = active.length === 0
          ? allSites
          : allSites.filter((site) => {
              const siteTags = new Set([
                ...(site.tags || []),
                ...(site.systemTags || []),
              ]);
              return active.every((t) => siteTags.has(t));
            });

        renderSites(results);
      }

      function renderSites(sites) {
        const container = document.getElementById("sites");
        const count = document.getElementById("count");
        container.innerHTML = "";
        count.textContent = `${sites.length} site${sites.length !== 1 ? "s" : ""}`;

        if (sites.length === 0) {
          container.innerHTML = '<p class="no-results">no sites match the current filters</p>';
          return;
        }

        sites.forEach((site) => {
          const userTags = (site.tags || [])
            .map((t) => `<span class="tag tag-user">${t}</span>`)
            .join("");
          const systemTags = (site.systemTags || [])
            .map((t) => `<span class="tag tag-system">${t}</span>`)
            .join("");

          const mutualCount = (site.mutuals || []).length;
          const inboundCount = site._inbound ?? "";

          const div = document.createElement("div");
          div.className = "site";
          div.innerHTML = `
            <h2><a href="${site.url}" target="_blank" rel="noopener">${site.name}</a></h2>
            <p class="desc">${site.description || ""}</p>
            <div class="tags">${userTags}${systemTags}</div>
            <div class="meta">
              <span>${site.neighbors?.length ?? 0} neighbors</span>
              ${mutualCount ? `<span>${mutualCount} mutual${mutualCount !== 1 ? "s" : ""}</span>` : ""}
            </div>
          `;
          container.appendChild(div);
        });
      }

      async function loadSites() {
        const res = await fetch("/api/sites");
        allSites = await res.json();
        applyFilters();
      }

      document.getElementById("reset").addEventListener("click", () => {
        ["f-core", "f-vibe", "f-safety", "f-system"].forEach((id) => {
          document.getElementById(id).value = "";
        });
        applyFilters();
      });

      loadTags();
      loadSites();
    </script>
  </body>
</html>
