kind = "web"
previewPath = "/"
title = "ternbook"
version = "1.0.0"
id = "artifacts/ternbook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18715

[services.development]
run = "pnpm --filter @workspace/ternbook run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "18715"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "18715"
BASE_PATH = "/"
