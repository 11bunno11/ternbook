kind = "web"
previewPath = "/"
title = "ternbook"
version = "1.0.0"
id = "artifacts/ternbook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18715

[services.development]
run = "pnpm --filter @workspace/ternbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ternbook", "run", "build" ]
publicDir = "artifacts/ternbook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18715"
BASE_PATH = "/"
